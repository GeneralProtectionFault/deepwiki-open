services:
  deepwiki:
    # Build from the same Dockerfile you use with `docker run`
    build:
      context: .
      dockerfile: Dockerfile-ollama-local

    # Force the image to get the exact tag you used in the `docker run`
    image: deepwiki:ollama-local
    tty: true
    # Ports: same as `-p 3000:3000 -p 8001:8001`
    ports:
      - "3000:3000"
      - "8001:8001"

    # Mount your persistence dir (same as `-v ~/.adalflow:/root/.adalflow`)
    volumes:
      - ~/.adalflow:/root/.adalflow
      - ~/.ollama:/root/.ollama  # Store ollama models in volume so rebuilding doesn't suck
      - ./api/logs:/app/api/logs

    # Env file – you can keep this if you have other vars
    env_file:
      - .env

    # Add the `OLLAMA_HOST` env var (the value can be overridden by the .env file)
    environment:
      - PORT=${PORT:-8001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - DEEPWIKI_EMBEDDER_TYPE=${DEEPWIKI_EMBEDDER_TYPE:-ollama}

    # Memory limits (same as your `mem_limit` / `mem_reservation`)
    mem_limit: 64g
    mem_reservation: 8g

    # Health‑check (kept from your original file)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s